# ==========================================
# 1. SERVER CONFIGURATION
# ==========================================
server.port=8081
spring.application.name=auth-service

# ==========================================
# 2. MYSQL DATABASE CONFIGURATION
# ==========================================
# The '?createDatabaseIfNotExist=true' automatically creates the 'evnza_auth' database for you!
spring.datasource.url=jdbc:mysql://localhost:3307/evnza_auth?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. JPA / HIBERNATE CONFIGURATION
# ==========================================
# 'update' will automatically create your User and Role tables based on your Java code
spring.jpa.hibernate.ddl-auto=update
# Shows the SQL queries in your console (great for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# 4. EUREKA CLIENT CONFIGURATION
# ==========================================
# Tells this service where the Eureka Server is so it can register itself
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true