spring.application.name=payment-service
server.port=8083
# Database Configuration (Port 3307 for XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3307/db_payment?useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Stripe Configuration
stripe.api.key=${STRIPE_SECRET_KEY}
# --- Actuator Configuration (Fixes Eureka Link) ---
management.endpoints.web.exposure.include=health,info,metrics
management.info.env.enabled=true

# --- Info Page Details ---
info.app.name=${spring.application.name}
info.app.description=Handles Stripe payments and transactions
info.app.version=1.0.0